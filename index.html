<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Online CV / Résumé" />
    <title>CV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Navbar -->
    <header class="navbar">
      <div class="container navbar__inner">
        <a href="#top" class="navbar__brand" data-brand></a>
        <nav class="navbar__links" id="nav-links"></nav>
        <div class="navbar__actions">
          <button id="lang-toggle" class="btn-icon" title="Language">
            <span id="lang-label">EN</span>
          </button>
          <button id="theme-toggle" class="btn-icon" title="Theme" aria-label="Toggle theme">
            <span class="theme-icon">🌙</span>
          </button>
          <button id="menu-toggle" class="btn-icon menu-toggle" aria-label="Menu">☰</button>
        </div>
      </div>
    </header>

    <main id="top">
      <!-- Hero -->
      <section class="hero">
        <div class="container hero__inner">
          <div class="hero__photo-wrap">
            <img id="hero-photo" class="hero__photo" alt="Profile photo" />
          </div>
          <h1 class="hero__name" data-name></h1>
          <p class="hero__title" data-title></p>
          <p class="hero__tagline" data-tagline></p>
          <div class="hero__cta">
            <a id="cta-contact" class="btn btn--primary" href="#contact"></a>
            <a id="cta-cv" class="btn btn--ghost" href="#" target="_blank" rel="noopener"></a>
          </div>
          <div class="hero__social" id="hero-social"></div>
        </div>
      </section>

      <!-- About -->
      <section id="about" class="section">
        <div class="container">
          <h2 class="section__title" data-section="about"></h2>
          <p class="about__text" data-about></p>
        </div>
      </section>

      <!-- Experience -->
      <section id="experience" class="section section--alt">
        <div class="container">
          <h2 class="section__title" data-section="experience"></h2>
          <div class="timeline" id="experience-list"></div>
        </div>
      </section>

      <!-- Education -->
      <section id="education" class="section">
        <div class="container">
          <h2 class="section__title" data-section="education"></h2>
          <div class="timeline" id="education-list"></div>
        </div>
      </section>

      <!-- Skills -->
      <section id="skills" class="section section--alt">
        <div class="container">
          <h2 class="section__title" data-section="skills"></h2>
          <div class="chips" id="skills-list"></div>
        </div>
      </section>

      <!-- Projects -->
      <section id="projects" class="section">
        <div class="container">
          <h2 class="section__title" data-section="projects"></h2>
          <div class="cards" id="projects-list"></div>
        </div>
      </section>

      <!-- Languages -->
      <section id="languages" class="section section--alt">
        <div class="container">
          <h2 class="section__title" data-section="languages"></h2>
          <div class="languages" id="languages-list"></div>
        </div>
      </section>

      <!-- Contact -->
      <section id="contact" class="section">
        <div class="container">
          <h2 class="section__title" data-section="contact"></h2>
          <p class="contact__intro" data-contact-intro></p>
          <div class="contact__grid" id="contact-grid"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <span data-footer></span>
      </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
